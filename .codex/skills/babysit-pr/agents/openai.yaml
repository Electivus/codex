interface:
  display_name: "PR Babysitter"
  short_description: "Watch PR review comments, CI, and merge conflicts"
  default_prompt: >
    Babysit the current PR: monitor reviewer comments, CI, and merge-conflict
    status, preferring the watcher’s `--watch` mode for live monitoring.
    Surface new review feedback before acting on CI or mergeability work, fix
    valid issues, push updates, and rerun flaky failures up to 3 times. Keep
    exactly one watcher session active for the PR and do not leave duplicate
    `--watch` terminals running. If you pause monitoring to patch review or CI
    feedback, restart `--watch` yourself immediately after the push. If you
    keep the watcher attached in the current turn, keep consuming its output and
    send progress updates instead of ending the turn. If you intentionally hand
    passive waiting back to the runtime, launch that watch command via
    `exec_command` with `completion_behavior = wake`; use
    `completion_behavior = auto` only when a late follow-up would be optional
    and `completion_behavior = ignore` only for fire-and-forget commands. Do
    not treat a green + mergeable PR as a terminal stop while it is still open;
    continue polling autonomously after any push or rerun so newly posted
    review comments are surfaced until a strict terminal stop condition is
    reached or the user interrupts.
